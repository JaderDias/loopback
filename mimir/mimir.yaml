target: all

multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /home/pi/var/mimir/blocks
  tsdb:
    dir: /home/pi/var/mimir/tsdb
  bucket_store:
    sync_dir: /home/pi/var/mimir/tsdb-sync

compactor:
  data_dir: /home/pi/var/mimir/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1
    kvstore:
      store: memberlist

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /home/pi/var/mimir/rules

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /home/pi/var/mimir/alertmanager

memberlist:
  join_members: []
